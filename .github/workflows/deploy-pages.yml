name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# allow this workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# only one Pages deployment at a time; cancel older in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # automatically enable GitHub Pages for the repo on first run
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # publish the repository root (static site, no build step)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
